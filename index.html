<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>零食商城</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family: "Microsoft YaHei",sans-serif}
:root{--main-blue:#165DFF;--white:#fff;--bg:#f4f4f4}
body{background:var(--bg)}
.top{background:var(--main-blue);color:var(--white);padding:10px 20px;display:flex;justify-content:space-between}
.header{background:#fff;padding:15px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.logo{font-size:24px;font-weight:bold;color:var(--main-blue)}
.search{width:500px;height:40px;display:flex;border:2px solid var(--main-blue);border-radius:4px}
.search input{flex:1;border:none;outline:none;padding:0 10px}
.search button{width:100px;background:var(--main-blue);color:#fff;border:none}
.nav{background:#fff;padding:12px 20px}
.nav a{margin-right:20px;text-decoration:none;color:#333}
.banner{background:var(--main-blue);color:#fff;text-align:center;padding:40px 0;font-size:22px}
.list{max-width:1200px;margin:0 auto;padding:20px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media(min-width:768px){.list{grid-template-columns:repeat(4,1fr)}}
.card{background:#fff;border-radius:8px;overflow:hidden;transition:0.3s}
.card:hover{transform:translateY(-5px);box-shadow:0 5px 15px rgba(0,0,0,0.2)}
.card img{width:100%;height:180px;object-fit:cover}
.info{padding:12px}
.title{font-size:14px;margin-bottom:8px;height:40px;overflow:hidden}
.price{color:var(--main-blue);font-size:18px;font-weight:bold;margin-bottom:8px}
.buy{width:100%;background:var(--main-blue);color:#fff;border:none;padding:8px;border-radius:4px}
.footer{background:var(--main-blue);color:#fff;text-align:center;padding:20px;margin-top:20px}
</style>
</head>
<body>
<div class="top">
    <span>欢迎来到零食商城</span>
    <span>我的订单 | 客服</span>
</div>

<div class="header">
    <div class="logo">🍪 零食商城</div>
    <div class="search">
        <input placeholder="搜索零食">
        <button>搜索</button>
    </div>
    <div>🛒 购物车</div>
</div>

<div class="nav">
    <a href="#">首页</a>
    <a href="#">膨化</a>
    <a href="#">巧克力</a>
    <a href="#">坚果</a>
    <a href="#">饼干</a>
    <a href="#">肉类</a>
</div>

<div class="banner">精选零食 · 满39元包邮</div>

<div class="list">
    <div class="card">
        <img src="https://picsum.photos/seed/chips/400/400" alt="">
        <div class="info">
            <div class="title">乐事原味薯片 香脆零食</div>
            <div class="price">¥8.9</div>
            <button class="buy">立即购买</button>
        </div>
    </div>
    <div class="card">
        <img src="https://picsum.photos/seed/chocolate/400/400" alt="">
        <div class="info">
            <div class="title">德芙牛奶巧克力 礼盒</div>
            <div class="price">¥35.8</div>
            <button class="buy">立即购买</button>
        </div>
    </div>
    <div class="card">
        <img src="https://picsum.photos/seed/cookie/400/400" alt="">
        <div class="info">
            <div class="title">黄油曲奇饼干 早餐零食</div>
            <div class="price">¥16.9</div>
            <button class="buy">立即购买</button>
        </div>
    </div>
    <div class="card">
        <img src="https://picsum.photos/seed/jelly/400/400" alt="">
        <div class="info">
            <div class="title">水果果冻 儿童零食</div>
            <div class="price">¥9.9</div>
            <button class="buy">立即购买</button>
        </div>
    </div>
    <div class="card">
        <img src="https://picsum.photos/seed/nuts/400/400" alt="">
        <div class="info">
            <div class="title">每日坚果 独立小包装</div>
            <div class="price">¥32.9</div>
            <button class="buy">立即购买</button>
        </div>
    </div>
    <div class="card">
        <img src="https://picsum.photos/seed/candy/400/400" alt="">
        <div class="info">
            <div class="title">水果软糖 QQ糖</div>
            <div class="price">¥11.9</div>
            <button class="buy">立即购买</button>
        </div>
    </div>
    <div class="card">
        <img src="https://picsum.photos/seed/spicy/400/400" alt="">
        <div class="info">
            <div class="title">网红大刀肉辣条</div>
            <div class="price">¥7.9</div>
            <button class="buy">立即购买</button>
        </div>
    </div>
    <div class="card">
        <img src="https://picsum.photos/seed/bread/400/400" alt="">
        <div class="info">
            <div class="title">手撕面包 早餐糕点</div>
            <div class="price">¥19.9</div>
            <button class="buy">立即购买</button>
        </div>
    </div>
    <div class="card">
        <img src="https://picsum.photos/seed/seaweed/400/400" alt="">
        <div class="info">
            <div class="title">即食海苔片 低脂零食</div>
            <div class="price">¥12.9</div>
            <button class="buy">立即购买</button>
        </div>
    </div>
</div>

<div class="footer">零食商城 © 2026 版权所有</div>
</body>
</html>
